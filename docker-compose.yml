services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: neebap
      POSTGRES_PASSWORD: neebap
      POSTGRES_DB: neebapnaebap
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neebap -d neebapnaebap"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  create-minio-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/neebapnaebap-local;
      mc anonymous set download local/neebapnaebap-local;
      "

volumes:
  postgres-data:
  minio-data:
